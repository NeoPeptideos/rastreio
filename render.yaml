databases:
  - name: rastreio-db
    databaseName: rastreio
    user: rastreio
    plan: free

services:
  - type: web
    name: rastreio-back
    runtime: node
    rootDir: back
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rastreio-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: rastreio-front
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: rastreio-front
    runtime: static
    rootDir: front
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: rastreio-back
          type: web
          envVarKey: RENDER_EXTERNAL_URL
