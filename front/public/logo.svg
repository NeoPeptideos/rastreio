    font-size="15">2</text>
  <path d="M168 100 C164 107 165 113 170 115"
    fill="none" stroke="#1d2b47" stroke-width="2.6" stroke-linecap="round"/>

  <!-- ":Peptideos" -->
  <text x="270" y="100"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
